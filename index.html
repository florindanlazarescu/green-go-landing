<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GreenGO - Mâncarea ta preferată, livrată local.</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-green: #2ecc71;
            --primary-hover: #27ae60;
            --text-dark: #2c3e50;
            --text-muted: #555;
            --bg-gradient-start: #f4fbf7;
            --bg-gradient-end: #d1f2e1;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            line-height: 1.4;
            color: var(--text-dark);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #f8fffb 0%, #e8f7ee 50%, #c8f0d8 100%);
            padding: 2rem;
        }

        .container {
            max-width: 1200px;
            width: 100%;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
            align-items: center;
        }

        .content {
            padding-right: 2rem;
        }

        .badge {
            display: inline-block;
            padding: 0.4rem 1rem;
            background-color: transparent;
            border: 1px solid #2ecc71;
            color: #2ecc71;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
        }

        h1 {
            font-size: 3.5rem;
            font-weight: 700;
            line-height: 1.1;
            margin-bottom: 1.2rem;
            color: #222;
        }

        p {
            font-size: 1.1rem;
            color: #666;
            margin-bottom: 2rem;
            max-width: 90%;
        }

        .btn {
            display: inline-block;
            padding: 0.8rem 2rem;
            background-color: #2ecc71;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            font-weight: 600;
            font-size: 1rem;
            transition: background-color 0.2s ease;
        }

        .btn:hover {
            background-color: #27ae60;
        }

        .image-container {
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .image-container img {
            width: 100%;
            height: auto;
            display: block;
            border-radius: 20px;
        }

        @media (max-width: 1024px) {
            h1 { font-size: 2.8rem; }
        }

        @media (max-width: 768px) {
            .container {
                grid-template-columns: 1fr;
                text-align: center;
            }
            .content { padding-right: 0; margin-bottom: 3rem; }
            p { margin-left: auto; margin-right: auto; }
            h1 { font-size: 2.5rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="content">
            <div class="badge">NOU: Livrări ultra-rapide în Greenfield</div>
            <h1>Mâncarea ta preferată,<br>livrată local.</h1>
            <p>GreenGO conectează comunitatea Greenfield cu restaurantele locale. Fără timpi mari de așteptare, fără taxe ascunse.</p>
            <a href="#" class="btn">Comandă acum</a>
        </div>
        <div class="image-container">
            <img src="https://images.unsplash.com/photo-1525351484163-7529414344d8?ixlib=rb-4.0.3&auto=format&fit=crop&w=1200&q=80" alt="Avocado Toast">
        </div>
    </div>
</body>
</html>
